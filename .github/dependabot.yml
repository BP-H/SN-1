version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/super-nova-2177/frontend-social-seven"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "frontend-social-seven"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/super-nova-2177"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "local-runner"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "pip"
    directory: "/super-nova-2177/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps"
