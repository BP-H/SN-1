name: Local Safe Check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-safe-check
  cancel-in-progress: false

jobs:
  safe-check:
    name: Run local safe checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r super-nova-2177/backend/requirements.txt

      - name: Run local safe check
        run: python scripts/check_safe.py --local-only
