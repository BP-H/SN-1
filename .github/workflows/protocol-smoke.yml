name: Public Protocol Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to smoke-check"
        required: false
        default: "https://2177.tech"
  schedule:
    - cron: "17 11 * * *"

permissions:
  contents: read

concurrency:
  group: public-protocol-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke public protocol
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public protocol smoke check
        env:
          DEFAULT_BASE_URL: "https://2177.tech"
          INPUT_BASE_URL: ${{ github.event.inputs.base_url }}
        run: |
          BASE_URL="${INPUT_BASE_URL:-$DEFAULT_BASE_URL}"
          python scripts/smoke_protocol.py "$BASE_URL"
