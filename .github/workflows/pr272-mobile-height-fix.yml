name: PR 272 mobile height fix

on:
  push:
    branches:
      - codex/content-first-visual-hierarchy
    paths:
      - .github/workflows/pr272-mobile-height-fix.yml

permissions:
  contents: write

jobs:
  tighten-mobile-explainer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/content-first-visual-hierarchy
      - name: Tighten mobile explainer spacing
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('super-nova-2177/frontend-social-seven/app/globals.css')
          text = path.read_text()
          replacements = {
              '    padding: 0.62rem 0.72rem;': '    padding: 0.48rem 0.66rem;',
              '    gap: 0.35rem;': '    gap: 0.24rem;',
              '    gap: 0.3rem;': '    gap: 0.22rem;',
              '    font-size: 0.78rem;\n    line-height: 1.28;': '    font-size: 0.76rem;\n    line-height: 1.22;',
              '    gap: 0.36rem;': '    gap: 0.28rem;',
              '    padding-inline: 0.35rem;\n    font-size: 0.7rem;': '    min-height: 2rem;\n    padding-inline: 0.24rem;\n    font-size: 0.68rem;',
              '    width: 2.5rem;\n    height: 2.5rem;': '    width: 2rem;\n    height: 2rem;',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected CSS fragment: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          rm .github/workflows/pr272-mobile-height-fix.yml
      - name: Commit mobile height fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add super-nova-2177/frontend-social-seven/app/globals.css .github/workflows/pr272-mobile-height-fix.yml
          git commit -m "Tighten mobile explainer height"
          git push origin HEAD:codex/content-first-visual-hierarchy
